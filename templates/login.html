<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - إدارة المهام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="network-bg">
        <canvas id="networkCanvas"></canvas>
    </div>
    
    <button class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع">
        <i class="fas fa-moon"></i>
    </button>
    
    <div class="login-container">
        <div class="logo">
            <!-- ضع صورة اللوقو هنا -->
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="شعار الشركة" class="logo-image" style="max-width: 150px; display: none;" id="companyLogo">
            <div class="logo-icon" id="defaultIcon">
                <i class="fas fa-tasks"></i>
            </div>
            <h1>إدارة المهام</h1>
            <p>نظام متكامل لإدارة مهام الموظفين</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> اسم المستخدم
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" name="username" required placeholder="أدخل اسم المستخدم">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> كلمة المرور
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" required placeholder="أدخل كلمة المرور">
                </div>
            </div>
            
<button type="submit" class="btn">
                <i class="fas fa-sign-in-alt"></i>
                تسجيل الدخول
            </button>
        </form>
        
        <div class="github-login">
            <a href="{{ url_for('github.login') }}" class="btn btn-github">
                <i class="fab fa-github"></i>
                تسجيل الدخول عبر GitHub
            </a>
        </div>
        
        <div class="demo-info">
            <p><i class="fas fa-info-circle"></i> للتجربة: <strong>admin</strong> / <strong>admin123</strong></p>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
