<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - إدارة المهام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .network-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .network-bg canvas { width: 100%; height: 100%; opacity: 0.08; }
    </style>
</head>
<body>
    <div class="network-bg">
        <canvas id="networkCanvas"></canvas>
    </div>
    
    <!-- Theme Toggle - Fixed at top left -->
    <button class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع">
        <i class="fas fa-moon"></i>
    </button>
    
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-tasks"></i>
            </div>
            <h1>إدارة المهام</h1>
            <p>قم بتسجيل الدخول للمتابعة</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label><i class="fas fa-user"></i> اسم المستخدم</label>
                <div class="input-wrapper">
                    <i class="input-icon fas fa-user"></i>
                    <input type="text" name="username" required placeholder="أدخل اسم المستخدم">
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="input-icon fas fa-lock"></i>
                    <input type="password" name="password" required placeholder="أدخل كلمة المرور">
                </div>
            </div>
            
            <button type="submit" class="btn">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
        </form>
        
        <div class="demo-info">
            <i class="fas fa-info-circle"></i>
            <strong>حساب المدير:</strong> admin / admin123
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
